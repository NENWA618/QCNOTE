<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 300px; padding: 10px; font-family: Arial, sans-serif; }
    .button { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin: 5px; }
    .button:hover { background: #2563eb; }
    .button:disabled { background: #9ca3af; cursor: not-allowed; }
    .status { margin-top: 10px; font-size: 12px; color: #6b7280; }
  </style>
</head>
<body>
  <h3>NOTE 网页剪藏</h3>

  <button id="clipPage" class="button">剪藏整页</button>
  <button id="clipSelection" class="button">剪藏选中内容</button>
  <button id="clipArticle" class="button">剪藏文章</button>

  <div class="status" id="status">就绪</div>

  <script src="popup.js"></script>
</body>
</html>
